<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Trading Simulation Tester</title>
    <link rel="stylesheet" href="./src/style.css?v=5" />
  </head>
  <body>
    <div class="container">
      <h1>Trading Simulation Tester</h1>
      <p class="hint">后端默认: <code>http://127.0.0.1:8000</code></p>

      <section class="card">
        <h2>连接设置</h2>
        <div class="row">
          <label>API Base</label>
          <input id="apiBase" value="http://127.0.0.1:8000" />
          <button id="saveBase">保存</button>
          <button id="checkHealth">健康检查</button>
        </div>
        <div id="healthResult" class="status-panel muted">未检测</div>
      </section>

      <section class="card">
        <h2>实时行情 (WebSocket)</h2>
        <div class="row">
          <button id="connectWs">连接 WS</button>
          <button id="disconnectWs">断开 WS</button>
          <span id="wsStatus">未连接</span>
        </div>
        <table>
          <thead>
            <tr><th>Symbol</th><th>Price</th><th>Change%</th><th>Volume</th><th>TS</th></tr>
          </thead>
          <tbody id="marketTable"></tbody>
        </table>
      </section>

      <section class="card">
        <h2>下单</h2>
        <div class="grid">
          <label>User ID<input id="userId" value="u001" /></label>
          <label>Symbol<input id="symbol" value="AAPL" /></label>
          <label>Side
            <select id="side">
              <option value="buy">buy</option>
              <option value="sell">sell</option>
            </select>
          </label>
          <label>Quantity<input id="qty" type="number" min="1" value="10" /></label>
        </div>
        <button id="placeOrder">提交订单</button>
        <div id="orderResult" class="empty-state">暂无订单</div>
      </section>

      <section class="card">
        <h2>账户与分析</h2>
        <div class="row tab-row">
          <button id="loadPortfolio" class="tab-button active">查持仓</button>
          <button id="loadUserAnalysis" class="tab-button">查用户分析</button>
          <button id="loadMarketAnalysis" class="tab-button">查市场分析</button>
        </div>
        <div id="accountPanel" class="empty-state">暂无账户数据</div>
      </section>
    </div>

    <script src="./src/app.js?v=5"></script>
  </body>
</html>
