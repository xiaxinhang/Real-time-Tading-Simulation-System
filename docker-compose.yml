services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DATABASE_URL: sqlite:////app/data/trading.db
      MARKET_REFRESH_INTERVAL: "30"
      STRATEGY_TICK_INTERVAL: "5"
      REDIS_URL: redis://redis:6379/0
      SERVE_FRONTEND_DIST: "0"
      JWT_SECRET_KEY: change-me-in-production
    volumes:
      - backend_data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  backend_data:
